<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Text & Image Chat</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0b0c10; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        .blur-ball-1 {
            position: absolute; width: 400px; height: 400px; border-radius: 50%;
            filter: blur(100px); z-index: 0; opacity: 0.6;
            animation: flyAround1 25s infinite alternate, changeColor1 20s infinite alternate;
        }
        .blur-ball-2 {
            position: absolute; width: 350px; height: 350px; border-radius: 50%;
            filter: blur(90px); z-index: 0; opacity: 0.5;
            animation: flyAround2 30s infinite alternate, changeColor2 15s infinite alternate-reverse;
        }
        .blur-ball-3 {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(120px); z-index: 0; opacity: 0.4;
            animation: flyAround3 35s infinite alternate, changeColor1 28s infinite alternate-reverse;
        }
        @keyframes flyAround1 {
            0% { top: -10%; left: -10%; } 50% { top: 60%; left: 70%; } 100% { top: 30%; left: 20%; }
        }
        @keyframes flyAround2 {
            0% { bottom: -10%; right: -10%; } 50% { bottom: 70%; right: 50%; } 100% { bottom: 20%; right: 80%; }
        }
        @keyframes flyAround3 {
            0% { top: 40%; left: 80%; } 50% { top: -5%; left: 30%; } 100% { top: 70%; left: -5%; }
        }
        @keyframes changeColor1 {
            0% { background: #00d2ff; } 33% { background: #9d00ff; } 66% { background: #ff007c; } 100% { background: #00ff88; }
        }
        @keyframes changeColor2 {
            0% { background: #ffa500; } 50% { background: #0076ff; } 100% { background: #ff0055; }
        }
        h2 { 
            margin-bottom: 15px; color: #fff; font-weight: 400; 
            text-shadow: 0 0 15px rgba(255,255,255,0.3); z-index: 1;
        }
        #chat { 
            width: 100%; max-width: 550px; height: 60vh;
            border: 1px solid rgba(255,255,255,0.08); 
            background: rgba(20,21,26,0.65); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; overflow-y: auto; padding: 15px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); z-index: 1;
        }
        .msg-wrapper { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.03);
            padding: 12px; border-radius: 12px; animation: fadeIn 0.25s ease; 
            max-width: 85%; width: fit-content;
        }
        .msg-meta { font-size: 11px; color: #aaa; margin-bottom: 5px; display: flex; gap: 10px; }
        .msg-text { font-size: 15px; word-break: break-word; margin-bottom: 5px; }
        img { max-width: 100%; max-height: 250px; border-radius: 8px; display: block; margin-top: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .controls { width: 100%; max-width: 550px; margin-top: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1; }
        .input-row { display: flex; gap: 10px; }
        input[type="text"] { 
            flex: 1; background: rgba(30,32,40,0.7); border: 1px solid rgba(255,255,255,0.08); 
            padding: 12px; border-radius: 12px; color: #fff; font-size: 14px; outline: none; 
            backdrop-filter: blur(10px);
        }
        input[type="text"]:focus { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        button { 
            background: #fff; color: #000; border: none; padding: 0 22px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.2); }
        input[type="file"] { display: none; }
        .file-label { 
            background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); 
            text-align: center; padding: 10px; border-radius: 12px; cursor: pointer; 
            font-size: 13px; color: #bbb; transition: 0.2s; backdrop-filter: blur(10px);
        }
        .file-label:hover { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.06); }
        .file-ready { border-color: #4caf50 !important; color: #4caf50 !important; background: rgba(76,175,80,0.05) !important; }
        .sys-msg { color: rgba(255,255,255,0.5); text-align: center; font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="blur-ball-1"></div>
    <div class="blur-ball-2"></div>
    <div class="blur-ball-3"></div>

    <h2>🌍 Международный Чат</h2>
    <div id="chat"></div>

    <div class="controls">
        <label for="file-input" id="file-label" class="file-label">📎 Прикрепить картинку (необязательно)</label>
        <input type="file" id="file-input" accept="image/*">
        <div class="input-row">
            <input type="text" id="name-input" placeholder="Ник" style="max-width: 90px;">
            <input type="text" id="text-input" placeholder="Введите сообщение...">
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <script>
        // Подключаемся к нашему серверу
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws`);
        
        const chat = document.getElementById('chat');
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const nameInput = document.getElementById('name-input');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');

        let attachedImageBase64 = null;

        ws.onopen = () => {
            const sys = document.createElement('div');
            sys.className = 'sys-msg';
            sys.innerText = '🟢 Подключение установлено';
            chat.appendChild(sys);
        };

        ws.onclose = () => {
            const sys = document.createElement('div');
            sys.className = 'sys-msg';
            sys.style.color = '#ff5555';
            sys.innerText = '🔴 Соединение разорвано. Обновите страницу.';
            chat.appendChild(sys);
            chat.scrollTop = chat.scrollHeight;
        };

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                attachedImageBase64 = reader.result;
                fileLabel.innerText = `✅ Выбрано: ${file.name.substring(0, 15)}...`;
                fileLabel.classList.add('file-ready');
            };
            reader.readAsDataURL(file);
        });

        function sendMessage() {
            const text = textInput.value.trim();
            const name = nameInput.value.trim() || 'Аноним';
            if (!text && !attachedImageBase64) return;

            const packet = {
                username: name,
                message: text,
                image: attachedImageBase64,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(packet));
            }

            textInput.value = '';
            attachedImageBase64 = null;
            fileInput.value = '';
            fileLabel.innerText = '📎 Прикрепить картинку (необязательно)';
            fileLabel.classList.remove('file-ready');
        }

        sendBtn.addEventListener('click', sendMessage);
        textInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);

                // Системное сообщение (например, очистка чата)
                if (data.system) {
                    const sys = document.createElement('div');
                    sys.className = 'sys-msg';
                    sys.innerText = '⚙️ ' + data.system;
                    chat.appendChild(sys);
                    chat.scrollTop = chat.scrollHeight;
                    return;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'msg-wrapper';

                const meta = document.createElement('div');
                meta.className = 'msg-meta';
                meta.innerHTML = `<b style="color:#00d2ff;">${data.username}</b><span>${data.time}</span>`;
                wrapper.appendChild(meta);

                if (data.message) {
                    const textDiv = document.createElement('div');
                    textDiv.className = 'msg-text';
                    textDiv.innerText = data.message;
                    wrapper.appendChild(textDiv);
                }

                if (data.image) {
                    const img = document.createElement('img');
                    img.src = data.image;
                    wrapper.appendChild(img);
                }

                chat.appendChild(wrapper);
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {}
        };
    </script>
</body>
</html>
